---
layout: default
---

<article class="post">
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <p class="post-meta">{{ page.date | date: "%B %-d, %Y" }}</p>
  </header>
  {{ content }}
  {% if page.tags %}
    <footer class="post-tags">
      {% for tag in page.tags %}
        <span>{{ tag }}</span>
      {% endfor %}
    </footer>
  {% endif %}
</article>

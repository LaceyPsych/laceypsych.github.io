{{ define "main" }}
  <article class="post">
    <header class="post-header">
      <h1>{{ .Title }}</h1>
      {{ if .Date }}
        <p class="post-meta">{{ .Date.Format "January 2, 2006" }}</p>
      {{ end }}
    </header>
    {{ .Content }}
    {{ with .Params.tags }}
      <footer class="post-tags">
        {{ range . }}
          <span>{{ . }}</span>
        {{ end }}
      </footer>
    {{ end }}
  </article>
{{ end }}

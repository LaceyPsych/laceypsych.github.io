<!doctype html>
<html lang="{{ site.Language.Locale | default "en-US" }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
    {{ with resources.Get "css/site.css" }}
      {{ $css := . | minify | fingerprint }}
      <link rel="stylesheet" href="{{ $css.RelPermalink }}">
    {{ end }}
    {{ with .OutputFormats.Get "rss" }}
      <link rel="alternate" type="application/rss+xml" title="{{ site.Title }}" href="{{ .Permalink }}">
    {{ end }}
  </head>
  <body>
    <header class="site-header">
      <a class="site-title" href="{{ "/" | relURL }}">{{ site.Title }}</a>
      <nav aria-label="Primary">
        <a href="{{ "/about/" | relURL }}">About</a>
        <a href="{{ "/resources/" | relURL }}">Resources</a>
      </nav>
    </header>
    <main class="site-main">
      {{ block "main" . }}{{ end }}
    </main>
    <footer class="site-footer">
      <p>{{ site.Params.description }}</p>
    </footer>
  </body>
</html>
